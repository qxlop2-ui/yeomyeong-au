<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여명 시작 (Yeomyeong Sijak) v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --win-bg: #2b3a3a; --win-grey: #b0b0b0; --win-white: #d1d1d1;
            --win-dark: #5a5a5a; --win-blue: #324664; --win-black: #1a1a1a;
        }

        body {
            background-color: var(--win-bg); font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #1a1a1a;
        }

        .window {
            width: 850px; background: var(--win-grey); border: 2px solid;
            border-color: var(--win-white) var(--win-dark) var(--win-dark) var(--win-white);
            box-shadow: 3px 3px 0 var(--win-black); margin-bottom: 20px;
        }

        .title-bar {
            background: linear-gradient(90deg, var(--win-blue), #526687); padding: 4px 6px;
            display: flex; justify-content: space-between; align-items: center;
            color: #e0e0e0; font-weight: bold; font-size: 13px;
        }

        .content { padding: 20px; }
        .input-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #333; }
        
        input, textarea {
            width: 100%; box-sizing: border-box; border: 2px solid;
            border-color: var(--win-dark) var(--win-white) var(--win-white) var(--win-dark);
            padding: 10px; font-size: 14px; outline: none; background-color: #e8e8e8;
        }
        textarea { height: 90px; resize: none; line-height: 1.5; font-size: 13px; }

        .au-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 20px;
        }
        .au-btn {
            padding: 8px 4px; background: var(--win-grey); border: 2px solid;
            border-color: var(--win-white) var(--win-dark) var(--win-dark) var(--win-white);
            font-size: 12px; cursor: pointer; text-align: center;
        }
        .au-btn.active {
            background: var(--win-blue); color: white;
            border-color: var(--win-dark) var(--win-white) var(--win-white) var(--win-dark);
            transform: translate(1px, 1px);
        }

        #loadingWindow {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 350px; z-index: 100; display: none;
        }
        .progress-container {
            height: 20px; background: white; margin-top: 10px; border: 2px solid;
            border-color: var(--win-dark) var(--win-white) var(--win-white) var(--win-dark);
            position: relative; overflow: hidden;
        }
        .progress-bar { width: 0%; height: 100%; background: var(--win-blue); transition: width 0.1s linear; }

        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 10px; padding: 15px; border-top: 1px solid #999; }
        .win-btn {
            padding: 10px 25px; background: var(--win-grey); border: 2px solid;
            border-color: var(--win-white) var(--win-dark) var(--win-dark) var(--win-white);
            cursor: pointer; font-family: 'Silkscreen', cursive; font-size: 14px; box-shadow: 1px 1px 0 var(--win-black);
        }
        .win-btn:active { transform: translate(1px, 1px); box-shadow: none; }

        #captureArea { margin-top: 40px; display: none; }
        .result-window { width: 700px; margin: 0 auto; background: var(--win-grey); border: 2px solid; border-color: var(--win-white) var(--win-dark) var(--win-dark) var(--win-white); }
        .result-body { padding: 40px; background: #f4f4f4; margin: 6px; border: 2px solid #888 inset; min-height: 350px; }
        .story-p { line-height: 2; margin-bottom: 25px; font-size: 15px; color: #111; text-align: justify; word-break: keep-all; }
        .story-tag { display: inline-block; font-weight: bold; color: var(--win-blue); margin-right: 12px; font-size: 13px; border-bottom: 2px solid var(--win-blue); }

        .footer-note { font-size: 12px; color: #7f8c8d; text-align: center; margin-top: 60px; font-weight: bold; }
    </style>
</head>
<body>

<div class="window">
    <!-- 타이틀 바를 V3.0으로 변경하여 업데이트 확인이 쉽도록 했습니다 -->
    <div class="title-bar">
        <span><i class="fas fa-terminal"></i> 여명 시작 (YEOMYEONG_SIJAK) - V3.0.EXE</span>
        <div style="display:flex; gap:3px;">
            <button class="win-btn" style="padding:1px 6px; font-size:9px;">?</button>
            <button class="win-btn" style="padding:1px 6px; font-size:9px;">×</button>
        </div>
    </div>
    <div class="content">
        <div class="input-section">
            <div>
                <label>CHAR_A: NAME (이름만 입력)</label>
                <input type="text" id="nameA" placeholder="예: 김여명">
                <textarea id="descA" style="margin-top:6px;" placeholder="캐릭터 A의 성격과 이면을 적어주세요."></textarea>
            </div>
            <div>
                <label>CHAR_B: NAME (이름만 입력)</label>
                <input type="text" id="nameB" placeholder="예: 이시작">
                <textarea id="descB" style="margin-top:6px;" placeholder="캐릭터 B의 성격과 이면을 적어주세요."></textarea>
            </div>
        </div>

        <label>WORLD_SETTING (AU 선택 - 새로운 25종)</label>
        <div class="au-grid" id="auGrid"></div>

        <div class="btn-group">
            <button class="win-btn" style="background-color: #9eabb3;" onclick="selectRandomAU()">RANDOM_SET</button>
            <button class="win-btn" style="background-color: #6c8ea4; color: white;" onclick="startCalculation()">GENERATE_STORY</button>
        </div>
    </div>
</div>

<div id="loadingWindow" class="window">
    <div class="title-bar"><span>SYSTEM_CALCULATING...</span></div>
    <div class="content" style="text-align: center;">
        <div id="loadingText" style="font-size: 12px; margin-bottom: 5px; font-weight: bold;">서사 구조 직조 중...</div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    </div>
</div>

<div id="captureArea">
    <div class="result-window" id="resultWin">
        <div class="title-bar"><span id="resultTitle">STORY_LOG.txt</span></div>
        <div class="result-body" id="storyOutput"></div>
    </div>
    <div class="btn-group">
        <button class="win-btn" style="background:#8e9eab" onclick="saveAsImage()">SAVE_TO_PNG</button>
    </div>
</div>

<div class="footer-note">
    여러분의 떠오르는 여명을 기대하며.<br>
    <span style="font-weight: normal; font-size: 10px;">© 2024 Yeomyeong Project.</span>
</div>

<script>
    function getJosa(word, josa) {
        if (!word) return '';
        const lastChar = word.charCodeAt(word.length - 1);
        if (lastChar < 0xAC00 || lastChar > 0xD7A3) return word + josa.charAt(0);
        const hasJongseong = (lastChar - 0xAC00) % 28 > 0;
        switch(josa) {
            case '은는': return word + (hasJongseong ? '은' : '는');
            case '이가': return word + (hasJongseong ? '이' : '가');
            case '을를': return word + (hasJongseong ? '을' : '를');
            case '와과': return word + (hasJongseong ? '과' : '와');
            case '으로': return word + (hasJongseong ? '으로' : '로');
            case '이의': return word + (hasJongseong ? '이' : ''); 
            default: return word;
        }
    }

    function parseText(text, nA, nB) {
        return text
            .replace(/{nA_은는}/g, getJosa(nA, '은는')).replace(/{nB_은는}/g, getJosa(nB, '은는'))
            .replace(/{nA_이가}/g, getJosa(nA, '이가')).replace(/{nB_이가}/g, getJosa(nB, '이가'))
            .replace(/{nA_을를}/g, getJosa(nA, '을를')).replace(/{nB_을를}/g, getJosa(nB, '을를'))
            .replace(/{nA_와과}/g, getJosa(nA, '와과')).replace(/{nB_와과}/g, getJosa(nB, '와과'))
            .replace(/{nA_으로}/g, getJosa(nA, '으로')).replace(/{nB_으로}/g, getJosa(nB, '으로'))
            .replace(/{nA_이}/g, getJosa(nA, '이의')).replace(/{nB_이}/g, getJosa(nB, '이의'))
            .replace(/{nA}/g, nA).replace(/{nB}/g, nB);
    }

    // 세부 스토리가 짜여진 핵심 AU 8종
    const auData = [
        {
            title: "히어로&빌런",
            gi: "{nA_은는} 무너지는 도시를 지탱하는 최전선의 영웅으로, 매일같이 피와 먼지를 뒤집어쓴 채 생명을 구하는 삶을 살고 있다. 반면 {nB_은는} 그 이면에서 혼돈을 조장하는 빌런으로 군림하며, 철저한 어둠 속에서 세상이 타들어가는 것을 지켜보고 있다.",
            seung: "거대한 붕괴 테러의 한복판, 불길이 치솟는 잔해 위에서 {nA_와과} {nB_이가} 운명적으로 충돌한다. 서로를 겨눈 무기 너머로 맨얼굴을 확인한 순간, 단순한 선악의 대립을 넘어선 잔혹한 인연의 톱니바퀴가 맞물려 돌아가기 시작한다.",
            jeon: "{nA_은는} {nB_을를} 파괴해야만 무고한 생명을 구할 수 있다는 사명감과 내면의 알 수 없는 끌림 사이에서 처절하게 무너져 내린다. 반면 {nB_은는} {nA_이} 가진 올곧은 신념을 완전히 부수고 오직 자신만의 어둠 속으로 끌어내리고자 하는 파괴적인 집착을 드러내며, 두 사람의 갈등은 서로의 영혼을 찢어놓는 혈투로 변모한다.",
            gyeol: "[메리배드 엔딩] 결국 무너지는 마천루의 꼭대기에서, {nA_은는} 세상을 구원하는 대신 {nB_이가} 내민 피 묻은 손을 잡고 동반 추락하는 길을 택한다. 불타오르는 붉은 노을 아래, 세상의 멸망과 함께 비로소 두 사람만의 완전한 세계가 완성된다."
        },
        {
            title: "네임버스",
            gi: "피부에 새겨진 운명의 이름표를 각자의 방식으로 가린 채, {nA_와과} {nB_은는} 아무런 교점 없는 일상을 살아간다. {nA_은는} 감정을 숨겨야 하는 건조한 직업에 종사하고 있으며, {nB_은는} 수많은 사람들 틈에 섞여 화려하지만 공허한 생활을 이어가고 있다.",
            seung: "우연히 맨살이 스친 찰나의 접촉. 서로의 이름이 붉게 타오르며 찌르는 듯한 통증을 느낀 순간, 두 사람의 세계는 급격히 요동친다. 하지만 이미 각자의 삶에는 쉽게 포기할 수 없는 현실의 무게와 타이밍의 엇갈림이라는 잔인한 고난이 도사리고 있었다.",
            jeon: "이름이 주는 폭력적일 만큼 강렬한 인력에 이끌리면서도, {nA_은는} 이 감정이 자신의 의지인지 아니면 각인에 의한 세뇌인지 끊임없이 의심하며 뒷걸음질 친다. 자신을 밀어내는 {nA_을를} 보며 상처받은 {nB_은는}, 운명을 강제해서라도 곁에 두겠다는 이기적인 욕망과 그를 자유롭게 놓아주어야 한다는 이성 사이에서 처절하게 부서져 간다.",
            gyeol: "[새드 엔딩] 끝내 운명의 장난에 굴복하지 않기로 한 두 사람은, 서로의 이름이 새겨진 부위를 화상으로 지워버리는 가혹한 선택을 한다. 흉터로 남은 자리에는 더 이상 인력도 통증도 없지만, 평생 텅 빈 감각을 안고 타인처럼 스쳐 지나가는 건조한 결말을 맞이한다."
        },
        {
            title: "가이드버스",
            gi: "{nA_은는} 언제 폭주할지 모르는 위험을 안고 전장을 누비는 최상급 에스퍼다. 진통제로 하루하루를 버티는 {nA_이} 앞에, 평범한 민간인으로 조용히 살아가고 있던 미등록 가이드 {nB_이가} 나타난다.",
            seung: "에스퍼들의 통제 구역에서 벌어진 갑작스러운 사고 현장. 한계에 달해 이성을 잃어가던 {nA_은는} 생존을 위해 본능적으로 {nB_에게} 달려들고, 강압적인 첫 가이딩을 통해 서로의 파장이 완벽히 일치한다는 파멸적인 사실을 깨닫는다.",
            jeon: "센터의 감시망이 좁혀오는 시련 속에서, {nA_은는} 자신의 생존을 위해 {nB_을를} 새장에 가두어야만 한다는 사실에 깊은 자괴감과 혐오를 느낀다. {nB_은는} 하루아침에 일상을 잃은 분노와, 피투성이가 된 {nA_을를} 외면하지 못하고 끌어안게 되는 연민 사이에서 극심한 혼란을 겪으며 서로를 향한 애증의 골을 파 내려간다.",
            gyeol: "[구원 해피엔딩] 지독한 갈등 끝에 {nA_은는} {nB_을를} 놓아주기 위해 홀로 죽음을 각오한 전투에 나선다. 하지만 {nB_은는} 스스로 전장으로 뛰어들어 {nA_을를} 감싸안으며 완전한 정신적 각인을 맺는다. 서로가 서로의 유일한 성소(Sanctuary)가 되며, 두 사람은 세상의 잣대를 벗어난 완벽한 평온을 얻는다."
        },
        {
            title: "오메가버스",
            gi: "{nA_은는} 사회의 정점에서 모든 것을 통제하는 우성 알파의 삶을, {nB_은는} 형질을 숨긴 채 억제제에 의존하며 아슬아슬한 밑바닥 인생을 버텨내고 있다. 두 사람의 궤도는 철저히 분리된 채 평행선을 달리고 있었다.",
            seung: "예기치 못한 밀폐된 공간에서의 고립. {nB_이} 억제제를 잃어버리며 터져 나온 페로몬은 {nA_이} 이성을 완벽하게 앗아간다. 본능과 폭력이 뒤섞인 하룻밤 이후, 두 사람 사이에는 약육강식이라는 잔혹한 사회적 시련이 가로막는다.",
            jeon: "자신의 완벽했던 통제력을 무너뜨린 {nB_을를} 향해 {nA_은는} 가학적인 소유욕과 병적인 집착을 보이며 그를 옭아맨다. {nB_은는} 굴복을 강요하는 {nA_을를} 향해 극렬하게 저항하면서도, 형질이 만들어내는 맹목적인 안도감에 점차 자아를 잃어가며 벼랑 끝으로 내몰린다.",
            gyeol: "[애증 엔딩] 도망치려는 끊임없는 시도 끝에 두 사람은 체념 섞인 타협점에 도달한다. 사랑이라는 단어로 포장할 수 없는 기형적인 관계지만, {nA_와과} {nB_은는} 서로가 내뿜는 체향 없이는 단 하루도 숨을 쉴 수 없는, 지독하게 얽힌 공생을 영원히 이어간다."
        },
        {
            title: "사이버펑크",
            gi: "네온사인이 비 내리는 마천루를 비추는 20XX년. {nA_은는} 감정을 거세하고 임무만 수행하는 기업의 엘리트 용병이며, {nB_은는} 기계화된 사회를 증오하며 지하 슬럼가에서 활동하는 천재 해커로 살아가고 있다.",
            seung: "기업의 극비 데이터를 빼돌리던 {nB_이가} {nA_이} 타겟으로 지정되며 두 사람은 총격전 속에서 조우한다. 하지만 {nB_이가} 흘린 데이터 조각 속에서 {nA_이} 삭제된 과거의 기억이 발견되며, 기업의 거대한 추적이라는 시련이 시작된다.",
            jeon: "추격을 피해 도망치는 과정에서 {nA_은는} 시스템의 명령에 복종할 것인지, 희미하게 되살아나는 인간성을 믿을 것인지 극심한 시스템 오류와 갈등을 겪는다. {nB_은는} 차가운 기계 몸통을 가진 {nA_에게}서 역설적으로 가장 따뜻한 온기를 느끼며, 그를 인간으로 되돌려놓겠다는 무모한 결단에 목숨을 건다.",
            gyeol: "[오픈 엔딩] 두 사람은 도시의 중앙 메인프레임을 파괴하는 데 성공하지만, 치명상을 입은 {nA_이} 동력은 서서히 꺼져간다. {nB_은는} 오프라인이 된 {nA_이} 기억 칩을 소중히 품에 안은 채, 태양이 떠오르는 도시의 폐허 너머 새로운 경계선으로 묵묵히 발걸음을 옮긴다."
        },
        {
            title: "아포칼립스",
            gi: "전염병으로 멸망해버린 잿빛 세상. {nA_은는} 감정을 지우고 오직 생존만을 위해 약탈을 서슴지 않는 방랑자이며, {nB_은는} 무너진 병원 지하에서 유일한 치료제의 단서를 지키며 은둔하는 연구자로 버티고 있다.",
            seung: "식량을 찾기 위해 침투한 {nA_와과} 그를 방어하려는 {nB_은는} 총구를 겨눈 채 처음 마주한다. 바깥에는 변이된 감염자들이 몰려들고, 닫힌 셔터문 안에서 한정된 물자와 서로를 향한 불신이라는 절망적인 시련이 시작된다.",
            jeon: "{nA_은는} 쓸모없는 온정을 베푸는 {nB_을를} 위선이라 조롱하면서도, 그가 보여주는 맹목적인 다정함에 점차 마음의 벽이 무너지는 것을 느낀다. 반면 {nB_은는} 잔혹한 생존 방식에 물들어가는 자신에 대한 공포와, 어떻게든 {nA_을를} 살려내겠다는 굳건한 의지 사이에서 치열하게 내적 갈등을 겪는다.",
            gyeol: "[희생 새드엔딩] 감염자들의 대규모 습격이 시작된 날, {nA_은는} {nB_이가} 치료제와 함께 탈출할 수 있도록 스스로 미끼가 되어 감염자 무리 속으로 뛰어든다. 안전지대에 도착한 {nB_은는} {nA_이가} 마지막으로 남긴 낡은 라디오를 끌어안고 소리 없이 오열한다."
        },
        {
            title: "동양풍 고전",
            gi: "반정의 피바람이 불던 시대. {nA_은는} 몰락한 가문의 마지막 후손으로 신분을 숨긴 채 암살자로 자라났고, {nB_은는} 권력의 중심에 서 있는 고귀한 적국의 장수로 만인 위에 군림하는 삶을 영위하고 있다.",
            seung: "달빛이 쏟아지는 연회장, {nA_이가} {nB_이} 목에 칼을 겨누면서 두 사람의 악연이 시작된다. 하지만 {nB_은는} {nA_이} 눈빛에서 과거 자신이 구해주었던 아이의 흔적을 발견하고, 칼을 거두며 시대의 소용돌이라는 거대한 고난을 자처한다.",
            jeon: "{nA_은는} 필생의 복수와 원수인 {nB_을를} 향해 싹트는 연정 사이에서 피를 토하는 듯한 심리적 고통을 겪는다. {nB_은는} 가문의 숙명과 황제의 의심 속에서도 지위를 버리면서까지 {nA_을를} 품으려 하며, 두 사람은 끊임없이 서로를 베어내면서도 끌어안는 모순적인 갈등을 이어간다.",
            gyeol: "[해피 엔딩] 모든 권력과 이름을 버린 두 사람은 아무도 찾지 못하는 깊은 산세로 숨어든다. 칼 대신 거문고를 켜는 {nB_와과} 그 곁에서 조용히 미소 짓는 {nA_은는}, 피로 얼룩졌던 과거를 뒤로한 채 평범한 촌부로서의 고요한 여생을 맞이한다."
        },
        {
            title: "탐정&범인",
            gi: "안개 낀 런던의 뒷골목. {nA_은는} 감정 없이 오직 논리와 증거만을 쫓는 천재 탐정이며, {nB_은는} 흔적조차 남기지 않고 살인을 예술로 승화시키는 희대의 연쇄살인마로 활약하고 있다.",
            seung: "{nB_이가} 남긴 조롱 섞인 메시지를 단서로 {nA_은는} 마침내 사건의 중심에 도달한다. 비 내리는 시계탑 꼭대기에서 마주한 두 사람 사이에는, 잡으려는 자와 빠져나가려는 자의 숨막히는 지능 싸움이라는 시련이 드리운다.",
            jeon: "{nA_은는} {nB_이} 심연과 같은 광기에 동화될 것 같은 두려움을 느끼면서도, 세상에서 유일하게 자신의 지성을 온전히 이해해 주는 {nB_에게} 묘한 동질감을 느낀다. {nB_은는} {nA_을를} 자신이 만든 무대 위로 끌어들여 타락시키려는 집착을 보이며 갈등은 파국으로 치닫는다.",
            gyeol: "[여운 엔딩] 사건은 미제로 남고 {nB_은는} 연기처럼 사라지지만, {nA_이} 책상 위에는 늘 {nB_이가} 보낸 이름 없는 꽃이 배달된다. 범죄와 추리라는 뒤틀린 매개체로 연결된 두 사람의 지독한 숨바꼭질은 그들의 숨이 멎는 날까지 끝나지 않는다."
        }
    ];

    function getFallbackAU(theme, title) {
        return {
            title: title,
            gi: `[${title} 세계관] {nA_은는} 이 세계의 질서에 깊이 순응하며 자신만의 굳건한 일상을 지켜나가는 삶을 살고 있다. 그와 대조적으로 {nB_은는} 어딘가 결핍된 모습으로 이방인처럼 세상을 겉돌며 각자의 궤도를 맴돌고 있었다.`,
            seung: `예상치 못한 기이한 사건을 계기로 {nA_와과} {nB_은는} 엮이게 된다. 서로의 숨겨진 이면을 마주한 직후, '${theme}'이라는 잔혹한 운명이 두 사람의 목을 조여오며 피할 수 없는 거대한 시련이 막을 올린다.`,
            jeon: `점점 가혹해지는 상황 속에서 {nA_은는} 이성을 유지하려 애쓰지만, {nB_을를} 향해 걷잡을 수 없이 커져가는 감정 때문에 극심한 혼란을 겪는다. {nB_ 역시} 맹목적으로 다가오는 {nA_이} 손길을 뿌리치지 못한 채, 애증과 집착 사이에서 갈등은 파국을 향해 치닫는다.`,
            gyeol: `[운명적 결말] 거대한 폭풍이 휩쓸고 지나간 자리에 마침내 두 사람만이 남는다. 많은 것을 잃고 상처 입었지만, {nA_와과} {nB_은는} 서로의 체온을 통해 과거와는 완전히 다른 형태의 관계를 받아들이며, ${title}의 세계 속에서 오직 두 사람만의 여운 남는 결말을 맺는다.`
        };
    }

    // 새로 요청하신 8개의 AU를 포함해 총 25개의 라인업으로 완벽하게 구성했습니다. (베이커리, 무인도, 성지순례 삭제됨)
    const allAuTitles = [
        ["히어로&빌런", ""], ["네임버스", ""], ["가이드버스", ""], ["오메가버스", ""], ["사이버펑크", ""], 
        ["아포칼립스", ""], ["동양풍 고전", ""], ["탐정&범인", ""], 
        ["마피아 느와르", "배신과 피로 얼룩진 신뢰"], ["캠퍼스물", "부서질 듯 찬란한 청춘"], ["스팀펑크", "매연과 태엽 장치의 혁명"], 
        ["호러/괴담", "어둠 속의 광기와 잠식"], ["아이돌&팬", "스포트라이트 뒤의 비밀"], ["판타지 모험", "검과 마법의 잔혹 동화"], 
        ["디스토피아", "완벽하게 통제된 유토피아의 저항"], ["의학/병원", "생사의 갈림길에 선 집착"], ["시간여행", "끝없이 반복되는 타임루프"],
        ["서양풍 로판", "거짓된 계약과 맹목적 집착"], ["군부물", "전장의 피와 명예"], ["요괴/퇴마", "인외의 존재와 금기"], 
        ["역키잡", "맹목적인 소유욕의 역전"], ["책빙의/환생", "정해진 운명을 비트는 사랑"], ["청춘 밴드", "소음 속 유일한 주파수"], 
        ["인어/심해", "숨이 멎을 듯한 심연"], ["궁정 암투", "피로 물든 왕좌와 탐욕"]
    ];

    const finalAuData = allAuTitles.map((item, idx) => {
        if(idx < 8) return auData[idx];
        return getFallbackAU(item[1], item[0]); 
    });

    let selectedIdx = -1;
    const gridDiv = document.getElementById('auGrid');

    finalAuData.forEach((au, i) => {
        const btn = document.createElement('div');
        btn.className = 'au-btn';
        btn.innerText = au.title;
        btn.onclick = () => {
            document.querySelectorAll('.au-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedIdx = i;
        };
        gridDiv.appendChild(btn);
    });

    function selectRandomAU() {
        const rand = Math.floor(Math.random() * finalAuData.length);
        document.querySelectorAll('.au-btn')[rand].click();
    }

    function startCalculation() {
        const nA = document.getElementById('nameA').value.trim();
        const nB = document.getElementById('nameB').value.trim();

        if(!nA || !nB || selectedIdx === -1) {
            alert("캐릭터 이름과 AU 선택은 필수입니다.");
            return;
        }

        document.getElementById('captureArea').style.display = 'none';
        const loadingWindow = document.getElementById('loadingWindow');
        const progressBar = document.getElementById('progressBar');
        const loadingText = document.getElementById('loadingText');
        
        loadingWindow.style.display = 'block';
        let progress = 0;
        
        const logs = ["서사 데이터 익명화 처리 중...", "세계관 인과율 병합 중...", "기승전결 구조화 진행 중...", "엔딩 분기점 연산 완료..."];
        let logIdx = 0;

        const interval = setInterval(() => {
            progress += Math.random() * 20;
            if (progress > 100) progress = 100;
            progressBar.style.width = progress + "%";
            
            if (progress > (logIdx + 1) * 25) {
                loadingText.innerText = logs[logIdx] || "결과 출력 중...";
                logIdx++;
            }

            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    loadingWindow.style.display = 'none';
                    generateStory(nA, nB);
                }, 400);
            }
        }, 120);
    }

    function generateStory(nA, nB) {
        const au = finalAuData[selectedIdx];
        const output = document.getElementById('storyOutput');
        
        const story = [
            { tag: "起", text: parseText(au.gi, nA, nB) },
            { tag: "承", text: parseText(au.seung, nA, nB) },
            { tag: "轉", text: parseText(au.jeon, nA, nB) },
            { tag: "結", text: parseText(au.gyeol, nA, nB) }
        ];

        output.innerHTML = story.map(s => `
            <div class="story-p"><span class="story-tag">${s.tag}</span>${s.text}</div>
        `).join('');

        document.getElementById('resultTitle').innerText = `${nA}_X_${nB}_Scenario.txt`;
        document.getElementById('captureArea').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function saveAsImage() {
        const target = document.getElementById('resultWin');
        html2canvas(target, { backgroundColor: '#2b3a3a', scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Yeomyeong_Story.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
