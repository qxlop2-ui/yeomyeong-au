<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여명 시작 (Yeomyeong Sijak) v2.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --win-bg: #2b3a3a;
            --win-grey: #b0b0b0;
            --win-white: #d1d1d1;
            --win-dark: #5a5a5a;
            --win-blue: #324664;
            --win-black: #1a1a1a;
        }

        body {
            background-color: var(--win-bg);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            color: #1a1a1a;
        }

        .window {
            width: 850px;
            background: var(--win-grey);
            border: 2px solid;
            border-color: var(--win-white) var(--win-dark) var(--win-dark) var(--win-white);
            box-shadow: 3px 3px 0 var(--win-black);
            margin-bottom: 20px;
        }

        .title-bar {
            background: linear-gradient(90deg, var(--win-blue), #526687);
            padding: 4px 6px;
            display: flex; justify-content: space-between; align-items: center;
            color: #e0e0e0; font-weight: bold; font-size: 13px;
        }

        .content { padding: 20px; }

        .input-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #333; }
        
        input, textarea {
            width: 100%; box-sizing: border-box;
            border: 2px solid; border-color: var(--win-dark) var(--win-white) var(--win-white) var(--win-dark);
            padding: 10px; font-size: 14px; outline: none;
            background-color: #e8e8e8;
        }
        textarea { height: 110px; resize: none; line-height: 1.5; }

        .au-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 6px; margin-bottom: 20px;
        }

        .au-btn {
            padding: 8px 4px; background: var(--win-grey);
            border: 2px solid; border-color: var(--win-white) var(--win-dark) var(--win-dark) var(--win-white);
            font-size: 12px; cursor: pointer; text-align: center;
        }

        .au-btn.active {
            background: var(--win-blue); color: white;
            border-color: var(--win-dark) var(--win-white) var(--win-white) var(--win-dark);
            transform: translate(1px, 1px);
        }

        /* 로딩 팝업 */
        #loadingWindow {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; z-index: 100; display: none;
        }
        .progress-container {
            height: 20px; background: white; margin-top: 10px;
            border: 2px solid; border-color: var(--win-dark) var(--win-white) var(--win-white) var(--win-dark);
            position: relative; overflow: hidden;
        }
        .progress-bar {
            width: 0%; height: 100%; background: var(--win-blue);
            transition: width 0.1s linear;
        }

        .btn-group { 
            display: flex; justify-content: center; gap: 15px; 
            margin-top: 10px; padding: 15px; border-top: 1px solid #999;
        }

        .win-btn {
            padding: 10px 25px; background: var(--win-grey);
            border: 2px solid; border-color: var(--win-white) var(--win-dark) var(--win-dark) var(--win-white);
            cursor: pointer; font-family: 'Silkscreen', cursive; font-size: 14px;
            box-shadow: 1px 1px 0 var(--win-black);
        }

        .win-btn:active { transform: translate(1px, 1px); box-shadow: none; }

        #captureArea { margin-top: 40px; display: none; }
        .result-window { 
            width: 650px; margin: 0 auto; background: var(--win-grey); 
            border: 2px solid; border-color: var(--win-white) var(--win-dark) var(--win-dark) var(--win-white);
        }
        .result-body { 
            padding: 35px; background: #f4f4f4; margin: 6px; 
            border: 2px solid #888 inset; min-height: 350px; 
        }
        .story-p { line-height: 2; margin-bottom: 22px; font-size: 15px; color: #222; text-align: justify; }
        .story-tag { 
            display: inline-block; font-weight: bold; color: var(--win-blue); 
            margin-right: 12px; font-size: 13px; border-bottom: 2px solid var(--win-blue);
        }

        .footer-note { font-size: 11px; color: #7f8c8d; text-align: center; margin-top: 60px; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span><i class="fas fa-terminal"></i> 여명 시작 (YEOMYEONG_SIJAK) - V2.7.EXE</span>
        <div style="display:flex; gap:3px;">
            <button class="win-btn" style="padding:1px 6px; font-size:9px;">?</button>
            <button class="win-btn" style="padding:1px 6px; font-size:9px;">×</button>
        </div>
    </div>
    <div class="content">
        <div class="input-section">
            <div>
                <label>CHAR_A: NAME</label>
                <input type="text" id="nameA" placeholder="이름 입력">
                <textarea id="descA" style="margin-top:6px;" placeholder="성격/서사를 입력하세요."></textarea>
            </div>
            <div>
                <label>CHAR_B: NAME</label>
                <input type="text" id="nameB" placeholder="이름 입력">
                <textarea id="descB" style="margin-top:6px;" placeholder="성격/서사를 입력하세요."></textarea>
            </div>
        </div>

        <label>RELATIONSHIP_AXIS (관계의 핵심 문장)</label>
        <textarea id="relation" style="height:65px;" placeholder="두 사람을 관통하는 하나의 키워드나 문장을 적어주세요."></textarea>

        <label style="margin-top:20px;">WORLD_SETTING (AU 선택)</label>
        <div class="au-grid" id="auGrid"></div>

        <div class="btn-group">
            <button class="win-btn" style="background-color: #9eabb3;" onclick="selectRandomAU()">RANDOM_SET</button>
            <button class="win-btn" style="background-color: #6c8ea4; color: white;" onclick="startCalculation()">GENERATE_STORY</button>
        </div>
    </div>
</div>

<!-- 연산 대기 윈도우 -->
<div id="loadingWindow" class="window">
    <div class="title-bar">
        <span>CALCULATING...</span>
    </div>
    <div class="content" style="text-align: center;">
        <div id="loadingText" style="font-size: 12px; margin-bottom: 5px;">평행세계 연산 중...</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
</div>

<div id="captureArea">
    <div class="result-window" id="resultWin">
        <div class="title-bar">
            <span id="resultTitle">STORY_LOG.txt</span>
        </div>
        <div class="result-body" id="storyOutput"></div>
    </div>
    <div class="btn-group">
        <button class="win-btn" style="background:#8e9eab" onclick="saveAsImage()">SAVE_TO_PNG</button>
    </div>
</div>

<div class="footer-note">
    [SYSTEM] 당신의 서사를 기반으로 최적의 평행세계를 연산 중입니다...<br>
    © 2024 Yeomyeong Project.
</div>

<script>
    const auData = [
        { title: "히어로&빌런", theme: "선과 악의 불분명한 경계" },
        { title: "네임버스", theme: "살결 위에 새겨진 잔인한 운명" },
        { title: "가이드버스", theme: "서로를 옥죄는 필연적 구속" },
        { title: "오메가버스", theme: "본능이 이성을 앞지르는 순간" },
        { title: "사이버펑크", theme: "강철 차가움 속 남겨진 온기" },
        { title: "아포칼립스", theme: "멸망 끝에 남겨진 단 두 사람" },
        { title: "동양풍 고전", theme: "한 평생을 엇갈린 애달픈 연" },
        { title: "마피아 느와르", theme: "피와 연기로 얼룩진 신뢰" },
        { title: "캠퍼스물", theme: "가장 찬란하고 위태로운 계절" },
        { title: "탐정&범인", theme: "가장 완벽한 파멸의 추적" },
        { title: "성지순례", theme: "길 위에서 마주한 낯선 구원" },
        { title: "스팀펑크", theme: "멈춘 태엽을 깨우는 고동" },
        { title: "호러/괴담", theme: "어둠 속에 도사린 뒤틀린 애정" },
        { title: "아이돌&팬", theme: "가장 먼 곳에서 닿길 원하는 마음" },
        { title: "판타지 모험", theme: "끝나지 않는 기나긴 여정의 끝" },
        { title: "디스토피아", theme: "통제된 평화가 주는 안식" },
        { title: "의학/병원", theme: "생의 마지막 문턱에서 만난 인연" },
        { title: "무인도", theme: "문명을 벗어난 원초적 교감" },
        { title: "시간여행", theme: "인과율을 무시한 단 하나의 만남" },
        { title: "베이커리", theme: "부서지는 일상 속의 달콤함" }
    ];

    let selectedIdx = -1;
    const gridDiv = document.getElementById('auGrid');

    auData.forEach((au, i) => {
        const btn = document.createElement('div');
        btn.className = 'au-btn';
        btn.innerText = au.title;
        btn.onclick = () => {
            document.querySelectorAll('.au-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedIdx = i;
        };
        gridDiv.appendChild(btn);
    });

    function selectRandomAU() {
        const rand = Math.floor(Math.random() * auData.length);
        document.querySelectorAll('.au-btn')[rand].click();
    }

    // 연산 시작 및 로딩 애니메이션
    function startCalculation() {
        const nA = document.getElementById('nameA').value;
        const nB = document.getElementById('nameB').value;

        if(!nA || !nB || selectedIdx === -1) {
            alert("필수 항목을 모두 입력해주세요.");
            return;
        }

        // 초기화
        document.getElementById('captureArea').style.display = 'none';
        const loadingWindow = document.getElementById('loadingWindow');
        const progressBar = document.getElementById('progressBar');
        const loadingText = document.getElementById('loadingText');
        
        loadingWindow.style.display = 'block';
        let progress = 0;
        
        const logs = ["데이터 동기화 중...", "서사 임계점 분석...", "평행세계 탐색 중...", "인과율 연산 완료..."];
        let logIdx = 0;

        const interval = setInterval(() => {
            progress += Math.random() * 15;
            if (progress > 100) progress = 100;
            progressBar.style.width = progress + "%";
            
            if (progress > (logIdx + 1) * 25) {
                loadingText.innerText = logs[logIdx] || "결과 출력 중...";
                logIdx++;
            }

            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    loadingWindow.style.display = 'none';
                    generateStory();
                }, 500);
            }
        }, 150);
    }

    function generateStory() {
        const nA = document.getElementById('nameA').value;
        const nB = document.getElementById('nameB').value;
        const rel = document.getElementById('relation').value;

        const au = auData[selectedIdx].title;
        const theme = auData[selectedIdx].theme;
        const output = document.getElementById('storyOutput');
        
        const story = [
            { tag: "起 (기)", text: `${theme}이(가) 지배하는 ${au}의 세계 속에서 ${nA}와(과) ${nB}는 필연적으로 마주한다. 정적 속에 흐르는 긴장은 두 사람이 마주할 미래의 서막을 알리고 있었다.` },
            { tag: "承 (승)", text: `이미 오래전부터 ${rel}라는 굴레에 얽혀 있던 두 사람은 서로의 존재를 강렬하게 의식한다. 평온했던 일상은 균열이 가기 시작하고, 감춰두었던 진심이 서서히 표면 위로 드러난다.` },
            { tag: "轉 (전)", text: `${au}의 가혹한 시련이 닥치자, ${nA}는 소중한 것을 지키기 위해 돌이킬 수 없는 결단을 내린다. ${nB}를 향한 집착 혹은 희생은 두 사람의 관계를 완전히 새로운 국면으로 몰아넣는다.` },
            { tag: "結 (결)", text: `모든 것이 휩쓸고 지나간 자리에 오직 ${nA}와(과) ${nB}만이 남는다. 이제 이들에게 남은 것은 과거와는 다른 형태의 ${rel}이며, 두 사람은 이 낯선 결말을 함께 받아들이기로 한다.` }
        ];

        output.innerHTML = story.map(s => `
            <div class="story-p">
                <span class="story-tag">${s.tag}</span>${s.text}
            </div>
        `).join('');

        document.getElementById('resultTitle').innerText = `${nA}_X_${nB}_LOG.txt`;
        document.getElementById('captureArea').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function saveAsImage() {
        const target = document.getElementById('resultWin');
        html2canvas(target, { backgroundColor: '#2b3a3a', scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `YEOMYEONG_STORY_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
